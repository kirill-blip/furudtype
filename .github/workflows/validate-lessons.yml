name: Validate Typing Lessons

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Ajv CLI
        run: npm install -g ajv-cli

      - name: Validate all lessons against schema
        run: |
          ajv validate -s .github/workflows/schemas/lesson-schema.json -d "src/FurudType.Storage/Data/**/*.json"
